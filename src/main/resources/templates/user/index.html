<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{user/base::bas(~{:: section})}">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Contact Manager</title>
</head>
<body>
    <section>
        <div class="welcome-banner">
            <h2>Welcome back, <span th:text="${user.name}">User</span>!</h2>
            <p>Your contacts are organized and secure. What would you like to do today?</p>
            <div class="quick-actions">
                <a th:href="@{/addcontact}" class="btn-scm btn-scm-primary">
                    <i class="fas fa-user-plus"></i> Add New Contact
                </a>
                <a th:href="@{/user/show/0}" class="btn-scm btn-scm-light">
                    <i class="fas fa-users"></i> View All Contacts
                </a>
                <a th:href="@{/user/show/0(favorites=true)}" class="btn-scm btn-scm-light">
                    <i class="fas fa-star"></i> Favorites
                </a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-address-book"></i></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${contactCount}">0</div>
                    <div class="stat-label">Total Contacts</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${favoriteCount}">0</div>
                    <div class="stat-label">Favorites</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${workCount}">0</div>
                    <div class="stat-label">Work Contacts</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user"></i></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${personalCount}">0</div>
                    <div class="stat-label">Personal Contacts</div>
                </div>
            </div>
        </div>

        <div class="scm-card">
            <div class="scm-card-header">
                <h2><i class="fas fa-bolt me-2"></i>Quick Actions</h2>
            </div>
            <div class="scm-card-body">
                <div class="quick-actions">
                    <a th:href="@{/addcontact}" class="btn-scm btn-scm-primary">
                        <i class="fas fa-plus"></i> Add Contact
                    </a>
                    <a th:href="@{/user/import}" class="btn-scm btn-scm-outline">
                        <i class="fas fa-file-import"></i> Import CSV
                    </a>
                    <a th:href="@{/user/export/csv}" class="btn-scm btn-scm-outline">
                        <i class="fas fa-file-export"></i> Export CSV
                    </a>
                    <a th:href="@{/user/profile}" class="btn-scm btn-scm-outline">
                        <i class="fas fa-user-gear"></i> Edit Profile
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
