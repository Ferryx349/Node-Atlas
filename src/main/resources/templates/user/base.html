<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="bas(content)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/st.css(v=4)}">
    <title>Smart Contact Manager</title>
</head>
<body class="app-body">

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <a th:href="@{/user/index}">
                <i class="fas fa-address-book"></i>
                Smart Contact Manager
            </a>
        </div>

        <div class="sidebar-user" th:if="${user != null}">
            <img th:if="${user.imageurl != null and !user.imageurl.isEmpty()}"
                th:src="${user.imageurl}" class="sidebar-avatar-img" alt="Profile">
            <div th:unless="${user.imageurl != null and !user.imageurl.isEmpty()}"
                class="sidebar-avatar"
                th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</div>
            <div class="sidebar-user-info">
                <div class="name" th:text="${user.name}">User</div>
                <div class="role">Member</div>
            </div>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a th:href="@{/user/index}" th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <i class="fas fa-gauge-high"></i> Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/user/show/0}" th:classappend="${activePage == 'contacts'} ? 'active'">
                    <i class="fas fa-users"></i> My Contacts
                </a>
            </li>
                        <li>
                            <a th:href="@{/addcontact}" th:classappend="${activePage == 'add'} ? 'active'">
                                <i class="fas fa-user-plus"></i> Add Contact
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/user/import}" th:classappend="${activePage == 'import'} ? 'active'">
                                <i class="fas fa-file-import"></i> Import CSV
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/user/export/csv}">
                                <i class="fas fa-file-export"></i> Export CSV
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/user/ai}" th:classappend="${activePage == 'ai'} ? 'active'">
                                <i class="fas fa-robot"></i> AI Assistant
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/user/profile}" th:classappend="${activePage == 'profile'} ? 'active'">
                                <i class="fas fa-user-gear"></i> Profile
                            </a>
                        </li>
                    </ul>

        <div class="sidebar-footer">
            <div class="cypher-credit cypher-credit-sidebar">
                <span class="cypher-prompt">&gt;_</span>
                <span class="cypher-line">BUILT_BY :: <strong>ABHAY</strong></span>
                <span class="cypher-tag">// cypherpunk</span>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit">
                    <i class="fas fa-right-from-bracket"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <div class="app-main">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <p class="topbar-title" th:text="${pageTitle != null} ? ${pageTitle} : 'Dashboard'">Dashboard</p>
            </div>
            <div class="topbar-actions">
                <a th:href="@{/addcontact}" class="btn-scm btn-scm-primary btn-scm-sm d-none d-md-inline-flex">
                    <i class="fas fa-plus"></i> New Contact
                </a>
            </div>
        </header>

        <main class="page-content" th:replace="${content}"></main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggle = document.getElementById('sidebarToggle');

        toggle?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        });

        overlay?.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
