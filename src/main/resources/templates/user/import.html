<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{user/base::bas(~{:: section})}">
<head>
    <meta charset="UTF-8">
    <title>Import Contacts - Smart Contact Manager</title>
</head>
<body>
    <section>
        <div class="scm-card">
            <div class="scm-card-header">
                <h2><i class="fas fa-file-import me-2"></i>Import Contacts from CSV</h2>
            </div>
            <div class="scm-card-body">
                <p class="text-muted mb-4">
                    Upload a CSV file with columns:
                    <code>id,name,email,phone,work,nickname,category,favorite,description</code>
                </p>

                <form method="post" th:action="@{/user/import}" enctype="multipart/form-data">
                    <th:block th:replace="~{user/base :: csrf}"></th:block>
                    <div class="form-field mb-4">
                        <label for="file">CSV File</label>
                        <input type="file" class="form-control" id="file" name="file" accept=".csv,text/csv" required>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn-scm btn-scm-primary">
                            <i class="fas fa-upload"></i> Import Contacts
                        </button>
                        <a th:href="@{/user/export/csv}" class="btn-scm btn-scm-outline">
                            <i class="fas fa-download"></i> Download Sample (export current)
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
