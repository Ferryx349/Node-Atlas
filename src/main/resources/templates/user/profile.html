<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{user/base::bas(~{:: section})}">
<head>
    <meta charset="UTF-8">
    <title>Profile - Smart Contact Manager</title>
</head>
<body>
    <section>
        <div th:if="${message}" th:classappend="${message?.type}" class="alert alert-scm mb-4" role="alert">
            <span th:text="${message?.content}"></span>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="scm-card">
                    <div class="scm-card-header">
                        <h2><i class="fas fa-image me-2"></i>Profile Photo</h2>
                    </div>
                    <div class="scm-card-body">
                        <div class="image-upload-zone">
                            <div class="photo-preview photo-preview-lg" id="profilePhotoPreview">
                                <img th:if="${user.imageurl != null and !user.imageurl.isEmpty()}"
                                    th:src="${user.imageurl}" alt="Profile photo">
                                <th:block th:if="${user.imageurl == null or user.imageurl.isEmpty()}">
                                    <i class="fas fa-user"></i>
                                    <span>No profile photo</span>
                                </th:block>
                            </div>
                            <div class="image-upload-controls">
                                <form method="post" th:action="@{/user/profile/photo}" enctype="multipart/form-data" class="d-inline">
                                    <th:block th:replace="~{user/base :: csrf}"></th:block>
                                    <label class="btn-scm btn-scm-outline btn-scm-sm" for="profilePhoto">
                                        <i class="fas fa-upload"></i> Upload Photo
                                    </label>
                                    <input type="file" id="profilePhoto" name="photo" accept="image/jpeg,image/png,image/webp,image/gif" class="d-none"
                                        onchange="this.form.submit()">
                                </form>
                                <form th:if="${user.imageurl != null and !user.imageurl.isEmpty()}"
                                    method="post" th:action="@{/user/profile/photo}" class="d-inline ms-2">
                                    <th:block th:replace="~{user/base :: csrf}"></th:block>
                                    <input type="hidden" name="removePhoto" value="true">
                                    <button type="submit" class="btn-scm btn-scm-outline btn-scm-sm">
                                        <i class="fas fa-trash"></i> Remove
                                    </button>
                                </form>
                                <p class="image-upload-hint">JPG, PNG, WEBP, or GIF — max 5 MB</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="scm-card">
                    <div class="scm-card-header">
                        <h2><i class="fas fa-user me-2"></i>Profile Information</h2>
                    </div>
                    <div class="scm-card-body">
                        <form method="post" th:action="@{/user/profile/update}">
                            <th:block th:replace="~{user/base :: csrf}"></th:block>
                            <div class="form-field mb-3">
                                <label for="name">Username</label>
                                <input type="text" class="form-control" id="name" name="name" th:value="${user.name}" required>
                            </div>
                            <div class="form-field mb-3">
                                <label for="email">Email</label>
                                <input type="email" class="form-control" id="email" name="email" th:value="${user.email}" required>
                            </div>
                            <div class="form-field mb-3">
                                <label for="about">About</label>
                                <textarea class="form-control" id="about" name="about" rows="4" th:text="${user.about}"></textarea>
                            </div>
                            <button type="submit" class="btn-scm btn-scm-primary">
                                <i class="fas fa-save"></i> Save Profile
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="scm-card">
                    <div class="scm-card-header">
                        <h2><i class="fas fa-lock me-2"></i>Change Password</h2>
                    </div>
                    <div class="scm-card-body">
                        <form method="post" th:action="@{/user/profile/password}">
                            <th:block th:replace="~{user/base :: csrf}"></th:block>
                            <div class="form-field mb-3">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
                            </div>
                            <div class="form-field mb-3">
                                <label for="newPassword">New Password</label>
                                <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                            </div>
                            <div class="form-field mb-3">
                                <label for="confirmPassword">Confirm New Password</label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn-scm btn-scm-primary">
                                <i class="fas fa-key"></i> Update Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
