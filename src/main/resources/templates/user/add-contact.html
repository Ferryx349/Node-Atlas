<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{user/base::bas(~{:: section})}">
<head>
    <meta charset="UTF-8">
    <title>Add Contact - Smart Contact Manager</title>
</head>
<body>
    <section>
        <div class="scm-card">
            <div class="scm-card-header">
                <h2><i class="fas fa-user-plus me-2"></i>Add New Contact</h2>
            </div>
            <div class="scm-card-body">
                <form th:object="${contact}" method="post" th:action="@{/user/a-contact}" enctype="multipart/form-data">
                    <p class="form-section-title">Profile Photo</p>
                    <div class="image-upload-zone mb-4">
                        <div class="photo-preview" id="photoPreview">
                            <i class="fas fa-camera"></i>
                            <span>No photo selected</span>
                        </div>
                        <div class="image-upload-controls">
                            <label class="btn-scm btn-scm-outline btn-scm-sm" for="photo">
                                <i class="fas fa-upload"></i> Choose Image
                            </label>
                            <input type="file" id="photo" name="photo" accept="image/jpeg,image/png,image/webp,image/gif" class="d-none">
                            <p class="image-upload-hint">JPG, PNG, WEBP, or GIF — max 5 MB</p>
                        </div>
                    </div>

                    <p class="form-section-title">Basic Information</p>
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="name">Full Name <span class="text-danger">*</span></label>
                            <div class="input-with-icon">
                                <i class="fas fa-user"></i>
                                <input type="text" class="form-control" id="name" name="name" th:field="*{name}" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="nickname">Nickname</label>
                            <div class="input-with-icon">
                                <i class="fas fa-tag"></i>
                                <input type="text" class="form-control" id="nickname" name="nickname" th:field="*{nickname}" placeholder="Johnny">
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="phone">Phone</label>
                            <div class="input-with-icon">
                                <i class="fas fa-phone"></i>
                                <input type="text" class="form-control" id="phone" name="phone" th:field="*{phone}" placeholder="+1 234 567 8900">
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="email">Email</label>
                            <div class="input-with-icon">
                                <i class="fas fa-envelope"></i>
                                <input type="email" class="form-control" id="email" name="email" th:field="*{email}" placeholder="john@example.com">
                            </div>
                        </div>
                        <div class="form-field full-width">
                            <label for="work">Work / Company</label>
                            <div class="input-with-icon">
                                <i class="fas fa-briefcase"></i>
                                <input type="text" class="form-control" id="work" name="work" th:field="*{work}" placeholder="Acme Corporation">
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="category">Category</label>
                            <select class="form-control" id="category" name="category" th:field="*{category}">
                                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                            </select>
                        </div>
                        <div class="form-field d-flex align-items-end">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="favorite" name="favorite" th:field="*{favorite}">
                                <label class="form-check-label" for="favorite">Mark as favorite</label>
                            </div>
                        </div>
                    </div>

                    <p class="form-section-title mt-4">Additional Details</p>
                    <div class="form-field">
                        <label for="description">Description / Notes</label>
                        <textarea id="description" name="description" th:field="*{description}" rows="5"
                            placeholder="Add any notes about this contact..."></textarea>
                    </div>

                    <div class="d-flex gap-2 mt-4 flex-wrap">
                        <button type="submit" class="btn-scm btn-scm-primary">
                            <i class="fas fa-save"></i> Save Contact
                        </button>
                        <a th:href="@{/user/show/0}" class="btn-scm btn-scm-outline">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <script>
        document.getElementById('photo')?.addEventListener('change', function (e) {
            const preview = document.getElementById('photoPreview');
            const file = e.target.files[0];
            if (!file || !preview) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                preview.innerHTML = '<img src="' + ev.target.result + '" alt="Preview">';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
