<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::bas(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Contact Manager</title>
</head>
<body>
    <section class="auth-page">
        <div class="auth-card">
            <div class="auth-card-visual">
                <div class="visual-icon"><i class="fas fa-user-plus"></i></div>
                <h2>Join SCM Today</h2>
                <p>Create your free account and start organizing your contacts with search, pagination, and secure access from anywhere.</p>
            </div>
            <div class="auth-card-form">
                <h1>Create Account</h1>
                <p class="subtitle">Fill in your details to get started</p>

                <div th:if="${message}" th:classappend="${message?.type}" class="alert alert-scm" role="alert">
                    <span th:text="${message?.content}"></span>
                </div>

                <form th:action="@{/regis}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="name">Username</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-user"></i>
                            <input name="name" type="text" th:field="*{name}" class="form-control" id="name" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-envelope"></i>
                            <input name="email" type="email" th:field="*{email}" class="form-control" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-lock"></i>
                            <input name="password" type="password" th:field="*{password}" class="form-control" id="password" placeholder="Create a strong password" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="about">About <span class="text-muted fw-normal">(optional)</span></label>
                        <textarea name="about" id="about" rows="3" th:field="*{about}" placeholder="Tell us a bit about yourself" class="form-control"></textarea>
                    </div>
                    <div class="form-check mb-4">
                        <input type="checkbox" name="agreement" class="form-check-input" id="agreement" required>
                        <label class="form-check-label" for="agreement" style="font-size:0.875rem;">I accept the terms and conditions</label>
                    </div>
                    <button type="submit" class="btn-primary-scm mb-2">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                    <button type="reset" class="btn-outline-scm w-100 mb-3">Reset Form</button>
                    <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
                        Already have an account?
                        <a class="auth-footer-link" th:href="@{/signin}">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
