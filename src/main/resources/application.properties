spring.application.name=smart-contact-manager

# Database — set DB_URL or individual DB_HOST / DB_PORT / DB_NAME vars
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_contact_manager}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=${DB_SSL:false}}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Wait for MySQL when starting via Docker Compose / cloud cold starts
spring.datasource.hikari.initialization-fail-timeout=120000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# PORT is used by Render/Railway; SERVER_PORT for local/Docker
server.port=${PORT:${SERVER_PORT:8085}}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.file.upload-dir=${UPLOAD_DIR:uploads}

# Spring AI (OpenAI) — set OPENAI_API_KEY to enable
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
